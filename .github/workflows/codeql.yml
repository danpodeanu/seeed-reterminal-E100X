name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - "**/*.c"
      - "**/*.cc"
      - "**/*.cpp"
      - "**/*.h"
      - "**/*.hpp"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**/*.c"
      - "**/*.cc"
      - "**/*.cpp"
      - "**/*.h"
      - "**/*.hpp"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
