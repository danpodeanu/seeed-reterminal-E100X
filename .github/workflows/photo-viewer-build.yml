name: Photo Viewer build

on:
  push:
    paths:
      - "photo-viewer/**"
      - ".github/workflows/photo-viewer-build.yml"
  pull_request:
    paths:
      - "photo-viewer/**"
      - ".github/workflows/photo-viewer-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: photo-viewer

jobs:
  unit-tests:
    name: Native unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Run unit tests
        run: pio test -c platformio-test.ini -e native_test

  build:
    name: ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        environment:
          - reterminal_e1001
          - reterminal_e1002
          - reterminal_e1003
          - reterminal_e1004

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio intelhex

      - name: Create placeholder credentials
        run: cp include/secrets.h.example include/secrets.h

      - name: Build
        run: pio run -e "${{ matrix.environment }}"

      - name: Check preparation tool syntax
        run: python -m py_compile tools/prepare_photos.py
