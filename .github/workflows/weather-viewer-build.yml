name: Build Weather Viewer firmware

on:
  push:
    paths:
      - "weather-viewer/**"
      - ".github/workflows/weather-viewer-build.yml"
  pull_request:
    paths:
      - "weather-viewer/**"
      - ".github/workflows/weather-viewer-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: weather-viewer

jobs:
  build:
    name: ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        environment:
          - reterminal_e1001
          - reterminal_e1002
          - reterminal_e1003
          - reterminal_e1004

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio intelhex

      - name: Create placeholder credentials
        run: cp include/secrets.h.example include/secrets.h

      - name: Build
        run: pio run -e "${{ matrix.environment }}"
