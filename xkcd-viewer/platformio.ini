[platformio]
default_envs = reterminal_e1001

[env]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git#9ba53b691fb007d9c1b8fd37600cc71d6702125a
board = seeed-xiao-esp32-s3-sense
framework = arduino
upload_speed = 115200
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
lib_ldf_mode = deep+
build_flags =
    -D BOARD_HAS_PSRAM
    -I src
    # Arduino-ESP32 3.3.x's WiFi library includes Network.h but its current
    # library.properties omits that dependency. Add the framework header path
    # explicitly so Seeed's PlatformIO package can compile WiFi itself.
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
lib_deps =
    https://github.com/Seeed-Studio/Seeed_GFX.git#a2de1abca0597c202193f22d01e9fa35d1ff613b
    bblanchon/ArduinoJson @ ^7.4.2
    adafruit/Adafruit SHT4x Library @ ^1.0.5

[env:reterminal_e1001]
build_flags =
    ${env.build_flags}
    -D RETERMINAL_MODEL=1001

[env:reterminal_e1002]
build_flags =
    ${env.build_flags}
    -D RETERMINAL_MODEL=1002

[env:reterminal_e1003]
build_flags =
    ${env.build_flags}
    -D RETERMINAL_MODEL=1003

[env:reterminal_e1004]
build_flags =
    ${env.build_flags}
    -D RETERMINAL_MODEL=1004
